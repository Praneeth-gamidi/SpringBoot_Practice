<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f2f2f2; }
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }
        .msg { color: green; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Products</h1>
    <a href="/HomePage">← Back to Home</a>

    <h2>Add Product</h2>
    <form th:action="@{/products/add}" method="post">
        <input type="text" name="name" placeholder="Product Name" required />
        <input type="number" name="price" placeholder="Price" step="0.01" required />
        <button type="submit">Add Product</button>
    </form>

    <p class="msg" th:if="${message}" th:text="${message}"></p>

    <h2>All Products</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td>
                <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post">
                    <button class="delete-btn" type="submit">Delete</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
